<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}커스텀 티셔츠 관리 시스템{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #07090d;
            --bg-elev: #0b0f14;
            --bg-elev-2: #101621;
            --border: #202833;
            --text: #e8eaed;
            --muted: #95a2b4;
            --text-min-50: #c2cad6;
            --white: #ffffff;
            --black: #101113;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            background-color: var(--bg);
            color: var(--text);
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .navbar-nav .nav-link {
            font-weight: 500;
            margin: 0 5px;
            padding: 8px 16px !important;
            border-radius: 0;
            transition: all 0.2s ease;
        }
        
        .navbar-nav .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }
        
        .navbar-nav .nav-link.active {
            background-color: rgba(255, 255, 255, 0.16);
        }
        
        .main-content {
            min-height: calc(100vh - 76px);
            padding-top: 20px;
        }
        
        .card {
            border: 1px solid var(--border);
            border-radius: 0;
            box-shadow: none;
            background-color: var(--bg-elev);
            margin-bottom: 20px;
        }
        
        .card-header {
            background: var(--bg-elev-2);
            color: var(--text);
            border-radius: 0 !important;
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
        }
        
        .btn {
            border-radius: 0;
            font-weight: 400;
            padding: 8px 16px;
            box-shadow: none !important;
        }

        .btn-primary, .btn-success, .btn-info, .btn-warning, .btn-secondary, .btn-dark {
            background-color: var(--white);
            border-color: var(--white);
            color: var(--black);
        }

        .btn-outline-primary, .btn-outline-secondary, .btn-outline-success, .btn-outline-danger {
            background-color: transparent;
            border-color: #6b7280;
            color: #f5f5f5;
        }
        
        .table {
            border-radius: 0;
            overflow: hidden;
            color: var(--text);
            --bs-table-bg: var(--bg-elev);
            --bs-table-striped-bg: #0f141b;
            --bs-table-hover-bg: #131a24;
            --bs-table-border-color: var(--border);
        }
        
        .table thead th {
            background-color: #121a25;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            color: #d7dbe2;
        }
        
        .badge {
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 0;
            font-weight: 400;
        }
        
        .alert {
            border-radius: 0;
        }
        
        .pagination .page-link {
            border-radius: 0;
            margin: 0 2px;
            border: 1px solid var(--border);
            background-color: var(--bg-elev);
            color: var(--text);
        }
        
        .pagination .page-item.active .page-link {
            background-color: var(--white);
            border-color: var(--white);
            color: var(--black);
        }
        
        .form-control, .form-select {
            border-radius: 0;
            border: 1px solid #2b3542;
            background-color: #0f141b;
            color: #f3f4f6;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #495367;
            box-shadow: none;
            background-color: #0f141b;
            color: #f3f4f6;
        }

        .form-control::placeholder {
            color: #8a94a6;
        }

        .text-muted {
            color: var(--muted) !important;
        }

        /* 폼/본문 글자 가독성 하한 (너무 어두운 회색 방지) */
        .main-content,
        .main-content p,
        .main-content label,
        .main-content small,
        .main-content span,
        .main-content li,
        .main-content th,
        .main-content td,
        .main-content .form-label,
        .main-content .form-text,
        .main-content .text-dark,
        .main-content .text-body,
        .main-content .text-secondary {
            color: var(--text-min-50);
        }

        .main-content h1,
        .main-content h2,
        .main-content h3,
        .main-content h4,
        .main-content h5,
        .main-content h6,
        .main-content strong,
        .main-content b {
            color: var(--text);
        }

        .modal-content {
            background-color: var(--bg-elev);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0;
        }

        .modal-header,
        .modal-footer {
            border-color: var(--border);
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: #090c11; border-bottom: 1px solid #202833; min-height: 50px;">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}" style="font-size: 1rem;">
                <i class="fas fa-home me-2"></i>홈
            </a>
            
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'order_list' %}" style="font-size: 0.9rem;">
                    <i class="fas fa-list me-1"></i>주문
                </a>
                <a class="nav-link" href="{% url 'settlement_list' %}" style="font-size: 0.9rem;">
                    <i class="fas fa-check-circle me-1"></i>결과통보
                </a>
                <a class="nav-link" href="{% url 'financial_summary' %}" style="font-size: 0.9rem;">
                    <i class="fas fa-chart-line me-1"></i>재무
                </a>
                <a class="nav-link" href="{% url 'inventory_list' %}" style="font-size: 0.9rem;">
                    <i class="fas fa-boxes me-1"></i>재고
                </a>
                <a class="nav-link" href="{% url 'debug_upload' %}" style="font-size: 0.9rem;">
                    <i class="fas fa-bug me-1"></i>디버깅
                </a>
                <a class="nav-link" href="{% url 'api_settings' %}" style="font-size: 0.9rem;">
                    <i class="fas fa-cog me-1"></i>설정
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
